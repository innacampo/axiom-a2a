steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/axiom-repo/axiom-app:$COMMIT_SHA',
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/axiom-repo/axiom-app:latest',
      '.'
    ]

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/axiom-repo/axiom-app:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'axiom-service',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/axiom-repo/axiom-app:$COMMIT_SHA',
      '--region', 'us-central1',
      '--service-account', '220964896886-compute@developer.gserviceaccount.com',
      '--memory', '2Gi',
      '--cpu', '2',
      '--min-instances', '1',
      '--max-instances', '1',
      '--timeout', '300',
      '--startup-cpu-boost',
    ]

options:
  logging: CLOUD_LOGGING_ONLY