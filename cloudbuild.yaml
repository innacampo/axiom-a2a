steps:
  # Step 1: Build the Docker image using Artifact Registry path
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/axiom-repo/axiom-app:$COMMIT_SHA', 
      '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/axiom-repo/axiom-app:latest', 
      '.'
    ]

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/axiom-repo/axiom-app:$COMMIT_SHA']

  # Step 3: Deploy to Cloud Run with your GCS Bucket Mount
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'axiom-service',
      '--image', 'us-central1-docker.pkg.dev/$PROJECT_ID/axiom-repo/axiom-app:$COMMIT_SHA',
      '--region', 'us-central1',
      '--service-account', '220964896886-compute@developer.gserviceaccount.com',
      '--add-volume', 'name=chroma-storage,type=cloud-storage,bucket=medical-evidence-mcp-chroma-storage',
      '--add-volume-mount', 'volume=chroma-storage,mount-path=/app/medical-evidence-mcp/chroma_data'
    ]

options:
  logging: CLOUD_LOGGING_ONLY