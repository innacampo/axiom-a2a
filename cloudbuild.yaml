steps:
  # Step 1: Build the Docker image using your Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'gcr.io/$PROJECT_ID/axiom-app:$COMMIT_SHA', 
      '-t', 'gcr.io/$PROJECT_ID/axiom-app:latest', 
      '.'
    ]

  # Step 2: Push the image to Container/Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/axiom-app:$COMMIT_SHA']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'axiom-service',
      '--image', 'gcr.io/$PROJECT_ID/axiom-app:$COMMIT_SHA',
      '--region', 'us-central1', # Change to your specific region
      '--service-account', 'YOUR_CUSTOM_SERVICE_ACCOUNT_EMAIL'
    ]

# 🔥 THE FIX: Tell Cloud Build to use Cloud Logging instead of a default bucket
options:
  logging: CLOUD_LOGGING_ONLY